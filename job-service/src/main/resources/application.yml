server:
  port: 8083

spring:
  application:
    name: job-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/}job_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}


hireconnect:
  auth:
    base-url: ${AUTH_URL:http://localhost:8081}
  subscription:
    base-url: ${SUBSCRIPTION_URL:http://localhost:8087}


