server:
  port: 8082

spring:
  application:
    name: profile-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/}profile_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

hireconnect:
  auth:
    base-url: ${AUTH_URL:http://localhost:8081}
  uploads:
    dir: uploads


