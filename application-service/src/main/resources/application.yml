server:
  port: 8084

spring:
  application:
    name: application-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/}application_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

hireconnect:
  auth:
    base-url: ${AUTH_URL:http://localhost:8081}
  notification:
    base-url: ${NOTIFICATION_URL:http://localhost:8086}
  subscription:
    base-url: ${SUBSCRIPTION_URL:http://localhost:8087}

